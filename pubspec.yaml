name: zheduoduo
description: "折多多 - 商品折扣优惠记录工具"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 数据库
  drift: ^2.23.0
  drift_flutter: ^0.2.7
  sqlite3_flutter_libs: ^0.5.0

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 网络 / 同步
  dio: ^5.0.0
  connectivity_plus: ^6.0.5
  crypto: ^3.0.6
  synchronized: any
  webdav_client_plus: ^1.0.2

  # 图片
  flutter_image_compress: ^2.3.0
  flutter_image_compress_common: ^1.0.5
  flutter_image_compress_platform_interface: ^1.0.5
  image_picker: ^1.2.1
  cached_network_image: ^3.4.1

  # 数据
  yaml: ^3.1.2
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.0

  # UI
  flex_color_scheme: ^8.1.0
  dynamic_color: ^1.8.1
  go_router: ^14.6.0
  flutter_slidable: ^3.1.0
  skeletonizer: ^2.1.2
  shimmer: ^3.0.0
  animations: ^2.0.0

  # 系统
  restart_app: ^1.3.0

  # HTTP 服务
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  shelf_static: ^1.1.3

  # 工具
  permission_handler: ^11.4.0
  path_provider: ^2.1.5
  path: any
  share_plus: ^10.1.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  logger: ^2.6.2
  uuid: ^4.5.0
  intl: any
  archive: ^3.6.1
  file_picker: ^8.0.0
  webview_flutter: 4.10.0
  webview_flutter_android: 4.3.0
  shared_preferences: ^2.3.4

  # OCR
  google_mlkit_text_recognition: ^0.15.0

  # Desktop 窗口管理
  window_manager: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  drift_dev: ^2.23.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  freezed: ^2.5.0

flutter:
  uses-material-design: true
  assets:
    - assets/web/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
